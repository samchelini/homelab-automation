product-name: cf
network-properties:
  network:
    name: "tas"
  other_availability_zones:
  - name: "az1"
  singleton_availability_zone:
    name: "az1"
product-properties:
  .cloud_controller.apps_domain:
    value: ((tpcf.cloud_controller_apps_domain))
  .cloud_controller.system_domain:
    value: ((tpcf.cloud_controller_system_domain))
  .properties.credhub_internal_provider_keys:
    value:
    - key:
        secret: ((tpcf.opsman_decryption_passphrase))
      name: credhub_key
      primary: true
  .properties.license_key:
    value: ((tpcf.license_key))
  .router.static_ips:
    value: ((tpcf.router_static_ip))
  .diego_brain.static_ips:
    value: ((tpcf.diego_brain_static_ip))
  .tcp_router.static_ips:
    value: ((tpcf.tcp_router_static_ip))
  .properties.networking_poe_ssl_certs:
    value:
    - certificate:
        cert_pem: ((tpcf.networking_poe_ssl_certs_0_certificate))
        private_key_pem: ((tpcf.networking_poe_ssl_certs_0_privatekey))
      name: gorouter_cert
  .properties.security_acknowledgement:
    value: "X"
  .uaa.service_provider_key_credentials:
    value:
      cert_pem: ((tpcf.networking_poe_ssl_certs_0_certificate))
      private_key_pem: ((tpcf.networking_poe_ssl_certs_0_privatekey))
resource-config:
  backup_restore:
    instances: 0
  clock_global:
    instances: 1
  cloud_controller:
    instances: 1
  cloud_controller_worker:
    instances: 1
  credhub:
    instances: 1
  diego_brain:
    instances: 1
  diego_cell:
    instances: 2
  diego_database:
    instances: 1
  doppler:
    instances: 1
  log_cache:
    instances: 1
  loggregator_trafficcontroller:
    instances: 1
  mysql:
    instances: 1
  mysql_proxy:
    instances: 1
  mysql_monitor:
    instances: 1
  nats:
    instances: 1
  nfs_server:
    instances: 1
  router:
    instances: 1
  tcp_router:
    instances: 0
  uaa:
    instances: 1
