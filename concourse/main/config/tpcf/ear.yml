product-name: cf
network-properties:
  network:
    name: "tas"
  other_availability_zones:
  - name: "az1"
  singleton_availability_zone:
    name: "az1"
product-properties:
  .cloud_controller.apps_domain:
    value: ((tpcf.cloud_controller_apps_domain))
  .cloud_controller.system_domain:
    value: ((tpcf.cloud_controller_system_domain))
  .properties.credhub_internal_provider_keys:
    value:
    - key:
        secret: ((tpcf.opsman_decryption_passphrase))
      name: credhub_key
      primary: true
  .properties.license_key:
    value: ((tpcf.license_key))
  .properties.networking_poe_ssl_certs:
    value:
    - certificate:
        cert_pem: ((tpcf.networking_poe_ssl_certs_0_certificate))
        private_key_pem: ((tpcf.networking_poe_ssl_certs_0_privatekey))
      name: gorouter_cert
  .properties.security_acknowledgement:
    value: "X"
  .uaa.service_provider_key_credentials:
    value:
      cert_pem: ((tpcf.networking_poe_ssl_certs_0_certificate))
      private_key_pem: ((tpcf.networking_poe_ssl_certs_0_privatekey))
